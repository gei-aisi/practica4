---
- hosts: masters
  become: yes

  tasks:
    - name: Initialize Kubernetes cluster
      ansible.builtin.shell: kubeadm init --apiserver-advertise-address="{{ master_ip }}" --service-cidr="{{ service_network }}" --pod-network-cidr="{{ pod_network }}" --upload-certs --ignore-preflight-errors=NumCPU
      
    - name: Create .kube directory
      ansible.builtin.file:
        path: /home/vagrant/.kube
        state: directory
        mode: 0755

    - name: Copy admin.conf to user's config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: yes
        owner: vagrant
        group: vagrant
        mode: 0600
      tags: tag1
      
    - name: Install Calico
      become: false
      ansible.builtin.shell: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/calico.yaml
    
    - name: Remove join command script
      ansible.builtin.file:
        path: /vagrant/provisioning/join-command.sh
        state: absent
  
    - name: Generate join command
      ansible.builtin.shell: sleep 5 && kubeadm token create --print-join-command
      register: kubernetes_join_command

    - name: Print join command
      ansible.builtin.debug:
        var: kubernetes_join_command

    - name: Copy join command to local file
      local_action: copy content="{{ kubernetes_join_command.stdout_lines[0] }}" dest="/vagrant/provisioning/join-command.sh"

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Helm signing key
      ansible.builtin.get_url:
        url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
        dest: /etc/apt/keyrings/helm.gpg
        mode: '0644'
    
    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main"
        state: present
        filename: helm
        
    - name: Install Helm
      ansible.builtin.package:
        name: helm
        state: present
