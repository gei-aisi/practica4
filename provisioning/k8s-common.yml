---
- hosts: cluster
  become: yes

  vars:
    list_of_packages: 
      - ntp
      - sshpass
      - unzip
      - python3-apt
      - dnsutils
      - dos2unix
      - whois
      - curl
      - lynx
      - gpg
      - apt-transport-https
      - ca-certificates

  tasks:
    - name: Add master IP to known_hosts file
      ansible.builtin.known_hosts:
        path: /home/vagrant/.ssh/ssh_known_hosts
        name: "{{ master_hostname }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -t rsa ' ~ master_hostname) }}"

    - name: Copy containerd module file
      ansible.builtin.copy:
        src: containerd.conf
        dest: /etc/modules-load.d/
        owner: root
        group: root

    - name: Configure ip forwarding
      ansible.builtin.copy:
        src: 20-ip-forwarding.conf
        dest: /etc/sysctl.d/
        owner: root
        group: root

    - name: Add br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: present
        persistent: present

    - name: Apply kernel settings
      ansible.builtin.shell: sysctl --system

    - name: Remove default containerd config file
      ansible.builtin.file:
        path: /etc/containerd/config.toml
        state: absent
      notify:
        - restart containerd

    - name: Copy containerd config file
      ansible.builtin.copy:
        src: config.toml
        dest: /etc/containerd/config.toml
        owner: root
        group: root
      notify:
        - restart containerd
    
    - name: Remove swapfile from /etc/fstab
      ansible.builtin.mount:
        name: "{{ item }}"
        fstype: swap
        state: absent
      loop:
        - swap
        - none

    - name: Disable swap
      ansible.builtin.shell: swapoff -a

    - name: BLock (mask) swap.target
      ansible.builtin.systemd:
        name: swap.target
        masked: yes

    - name: Re-execute systemd daemon
      ansible.builtin.shell: systemctl daemon-reexec
        
    - name: Disable containerd
      ansible.builtin.service:
        name: containerd
        state: restarted
        
    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
    
    - name: Download Kubernetes signing key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        mode: '0644'
    
    - name: Add Kubernetes apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /"
        state: present
        filename: kubernetes
    
    - name: Install Kubernetes binaries
      ansible.builtin.apt: 
        name: "{{ packages }}"
        state: latest
        update_cache: true
      vars:
        packages:
          - kubelet 
          - kubeadm 
          - kubectl

    - name: Reset Kubernetes cluster
      ansible.builtin.shell: kubeadm reset -f

    - name: Remove CNI configuration
      ansible.builtin.file:
        path: /etc/cni/net.d/10-flannel.conflist
        state: absent

    - name: Remove Kubernetes config file
      ansible.builtin.file:
        path: /home/vagrant/.kube/config
        state: absent

    - name: Remove Kubernetes directory
      ansible.builtin.file:
        path: /etc/kubernetes
        state: absent
        
    - name: Reset iptables
      shell: iptables -F && iptables -X && iptables -t nat -F && iptables -t nat -X && iptables -t mangle -F && iptables -t mangle -X

  handlers:
    - name: restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted
